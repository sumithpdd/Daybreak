<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Daybreak">
  <defs>
    <linearGradient id="l-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="0.5" stop-color="#5cb8ff"/>
      <stop offset="1" stop-color="#2d9cef"/>
    </linearGradient>
    <linearGradient id="l-break" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cb8ff"/>
      <stop offset="1" stop-color="#2d9cef"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(16,16)">
    <g stroke="#ffd27a" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="10" x2="32" y2="4"/>
      <line x1="46" y1="16" x2="51" y2="11"/>
      <line x1="18" y1="16" x2="13" y2="11"/>
    </g>
    <g stroke="#5cb8ff" stroke-width="3" stroke-linecap="round">
      <line x1="52" y1="30" x2="58" y2="28"/>
      <line x1="12" y1="30" x2="6" y2="28"/>
    </g>
    <circle cx="32" cy="32" r="13" fill="url(#l-sun)"/>
    <rect x="9" y="44" width="46" height="4" rx="2" fill="#5cb8ff"/>
    <rect x="19" y="52" width="26" height="3" rx="1.5" fill="#2d9cef" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <text x="98" y="60" font-family="Montserrat, 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1">
    <tspan fill="#f3f7ff">Day</tspan><tspan fill="url(#l-break)">break</tspan>
  </text>
</svg>
